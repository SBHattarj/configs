setw -g mode-keys vi
unbind c
bind c new-window -c "#{pane_current_path}"
bind C send-keys C-u 'cdf -a' Enter
bind e send-keys C-u 'nvimf -a' Enter 
bind r send-keys C-u 'npmcmdf' Enter
bind q select-window -t 0
bind w select-window -t 1
bind t select-window -t 2
bind y select-window -t 3
set-option -g default-shell /bin/zsh
